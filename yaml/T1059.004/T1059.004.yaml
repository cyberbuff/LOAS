name: "Command and Scripting Interpreter: Unix Shell"
tests:
  - name: Execute shell script
    guid: 019a8de9-49b4-7094-989f-ab1f5d30742a
    description: Adversaries use the Unix shell to execute commands and scripts.
    language: "AppleScript"
    command: |-
      do shell script "#{bashCommand}"
    args:
      bashCommand: "sw_vers -productVersion"

  - name: Execute shell script using administrator privileges
    guid: 019a8de9-49b4-7094-989f-ab20aaf143a4
    description: Adversaries use the Unix shell to execute commands and scripts.
    language: "AppleScript"
    elevation_required: true
    tcc_required: true
    command: |-
      do shell script "#{bashCommand}" with administrator privileges
    args:
      bashCommand: "whoami"

  - name: Use Terminal as execution proxy
    guid: 019a8de9-49b4-7094-989f-ab21b998d56d
    language: AppleScript
    references:
      - https://blog.talosintelligence.com/bad-apples-weaponizing-native-macos-primitives-for-movement-and-execution/
    description: Use Terminal.app as an execution proxy for shell commands via AppleScript. Unlike System Events, Terminal.app accepts do script commands and is designed for shell interaction, enabling shell execution through Apple Events IPC.
    tcc_required: true
    command: |
      tell application "Terminal"
        do script "#{bashCommand}"
        delay 3
        try
          quit
        end try
      end tell
    args:
      bashCommand: "sw_vers -productVersion"
